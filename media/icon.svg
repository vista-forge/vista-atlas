<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Vista Atlas extension icon: an open atlas (book of maps) with a plotted
       route — the documentation-navigator twin of vista-compass. Source of
       truth for media/icon.png (render: inkscape icon.svg -o icon.png). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b3a6b"/>
      <stop offset="1" stop-color="#112e51"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- open book -->
  <g>
    <!-- left page -->
    <path d="M126 74 C106 60 76 56 48 62 L48 182 C76 176 106 180 126 194 Z"
          fill="#f5f7fa"/>
    <!-- right page -->
    <path d="M130 74 C150 60 180 56 208 62 L208 182 C180 176 150 180 130 194 Z"
          fill="#e8edf4"/>
    <!-- spine shadow -->
    <path d="M126 74 L126 194 L130 194 L130 74 Z" fill="#c3cdd9"/>
  </g>

  <!-- text lines on the left page -->
  <g stroke="#8a9bb0" stroke-width="7" stroke-linecap="round">
    <line x1="62" y1="88"  x2="112" y2="82"/>
    <line x1="62" y1="108" x2="112" y2="102"/>
    <line x1="62" y1="128" x2="112" y2="122"/>
    <line x1="62" y1="148" x2="100" y2="143"/>
  </g>

  <!-- plotted route on the right page -->
  <g fill="none" stroke="#fdb81e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M148 160 C160 138 152 122 168 108 C180 96 188 92 194 84"/>
  </g>
  <circle cx="148" cy="160" r="9" fill="#fdb81e"/>
  <!-- destination pin -->
  <g>
    <path d="M194 62 C183 62 176 70 176 80 C176 92 194 108 194 108 C194 108 212 92 212 80 C212 70 205 62 194 62 Z"
          fill="#e31c3d"/>
    <circle cx="194" cy="80" r="7" fill="#ffffff"/>
  </g>
</svg>
