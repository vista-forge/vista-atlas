<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Vista Atlas extension icon: a blue open book (atlas) on white, in the
       same flat single-blue line-art style + #0262E7 blue as the vista-compass
       twin's logo. Source of truth for media/icon.png
       (render: inkscape icon.svg -o icon.png). -->
  <rect width="256" height="256" fill="#ffffff"/>

  <text x="128" y="72" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif" font-weight="bold"
        font-size="30" letter-spacing="3" fill="#0262E7">VISTA</text>

  <!-- open book, bold line art -->
  <g stroke="#0262E7" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- covers/pages outline -->
    <path d="M128 108 C110 94 82 90 54 96 L54 186 C82 180 110 184 128 198
             C146 184 174 180 202 186 L202 96 C174 90 146 94 128 108 Z"
          fill="#ffffff"/>
    <!-- spine -->
    <line x1="128" y1="108" x2="128" y2="198"/>
  </g>

  <!-- page text lines, echoing the compass's tick marks -->
  <g stroke="#0262E7" stroke-width="9" stroke-linecap="round" fill="none">
    <line x1="74" y1="122" x2="106" y2="118"/>
    <line x1="74" y1="144" x2="106" y2="140"/>
    <line x1="74" y1="166" x2="96" y2="163"/>
    <line x1="150" y1="118" x2="182" y2="122"/>
    <line x1="150" y1="140" x2="182" y2="144"/>
    <line x1="160" y1="163" x2="182" y2="166"/>
  </g>
</svg>
